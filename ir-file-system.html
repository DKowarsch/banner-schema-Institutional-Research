<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Sierra University — IR Shared Drive File System</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b12;
  --surface: #0e1220;
  --surface2: #141929;
  --surface3: #1a2035;
  --border: #1f2740;
  --border2: #2a3555;
  --text: #e8eaf6;
  --muted: #9aa3c4;
  --hint: #5c6488;
  --accent: #4d7cfe;
  --accent-glow: rgba(77,124,254,0.15);
  --accent-dim: #0d1a45;
  --gold: #f0c060;
  --gold-dim: #2a1f00;
  --green: #34d399;
  --green-dim: #042b1e;
  --amber: #fbbf24;
  --amber-dim: #2a1a00;
  --coral: #f87171;
  --coral-dim: #2a0e0e;
  --purple: #a78bfa;
  --purple-dim: #1e1240;
  --teal: #22d3ee;
  --teal-dim: #042830;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(77,124,254,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,124,254,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
  background: rgba(8,11,18,0.88);
  backdrop-filter: blur(16px);
  padding: 0 2rem;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); letter-spacing: 0.12em;
  text-transform: uppercase; white-space: nowrap;
}

.logo-mark {
  width: 26px; height: 26px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
  box-shadow: 0 0 12px rgba(77,124,254,0.4);
  flex-shrink: 0;
}

.header-right { display: flex; align-items: center; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  padding: 6px 14px; border-radius: var(--radius);
  font-size: 12px; font-family: var(--sans); font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
  text-decoration: none;
}
.btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.btn-primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.btn-primary:hover { background: var(--accent); color: #fff; box-shadow: 0 0 16px var(--accent-glow); }
.btn-sm { padding: 4px 11px; font-size: 11px; }

/* ── LAYOUT ── */
.container { max-width: 1300px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

.page-eyebrow {
  font-family: var(--mono); font-size: 10px; color: var(--hint);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 4px;
}
.page-heading {
  font-size: 22px; font-weight: 300; color: var(--text);
  margin-bottom: 1.75rem; line-height: 1.3;
}
.page-heading strong { color: var(--accent); font-weight: 500; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.tab {
  padding: 9px 18px; font-size: 11px; font-family: var(--mono);
  cursor: pointer; color: var(--hint); letter-spacing: 0.08em;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--muted); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 220px; position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }

input[type="text"] {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--sans); font-size: 13px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
input[type="text"]::placeholder { color: var(--hint); }

select {
  padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--sans); font-size: 13px; outline: none; cursor: pointer;
  transition: border-color 0.15s;
}
select:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 1rem; margin-bottom: 1.25rem;
  flex-wrap: wrap; align-items: center;
}
.stat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.stat strong { color: var(--text); }

/* ── SECTION GRID ── */
.sections-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 10px;
}

/* ── SECTION CARD ── */
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
}
.section-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: transparent; transition: background 0.2s;
}
.section-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.section-card:hover::after { background: var(--accent); }

.section-card-header {
  padding: 14px 16px 10px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
}

.section-id {
  font-family: var(--mono); font-size: 11px;
  color: var(--hint); letter-spacing: 0.08em;
  margin-bottom: 3px;
}
.section-name {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  color: var(--gold); letter-spacing: 0.04em;
}
.section-desc {
  font-size: 12px; color: var(--muted); line-height: 1.5;
  padding: 0 16px 12px;
}

/* ── BADGES ── */
.badges { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 9.5px; font-family: var(--mono); padding: 2px 7px;
  border-radius: 4px; letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid transparent; font-weight: 500;
}
.badge-external   { background: var(--teal-dim);   color: var(--teal);   border-color: #073540; }
.badge-internal   { background: var(--accent-dim);  color: var(--accent); border-color: #122060; }
.badge-ir         { background: var(--purple-dim);  color: var(--purple); border-color: #2a1860; }
.badge-database   { background: var(--green-dim);   color: var(--green);  border-color: #0a4030; }
.badge-note { background: var(--amber-dim); color: var(--amber); border-color: #3a2200; font-size: 8.5px; }

/* ── FOLDER LIST ── */
.folder-list {
  border-top: 1px solid var(--border);
  padding: 10px 16px 14px;
}
.folder-item {
  display: flex; align-items: baseline; gap: 8px;
  padding: 4px 0; border-bottom: 1px solid rgba(31,39,64,0.5);
  font-size: 11.5px;
}
.folder-item:last-child { border-bottom: none; }
.folder-num {
  font-family: var(--mono); font-size: 10px; color: var(--hint);
  min-width: 38px; flex-shrink: 0;
}
.folder-name { color: var(--text); font-family: var(--mono); font-size: 11px; }
.folder-sub  { color: var(--muted); font-size: 11px; }
.folder-more {
  font-size: 10px; color: var(--hint); font-family: var(--mono);
  opacity: 0.5; padding-top: 4px;
}

/* ── FULL VIEW (modal-style expanded) ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center; padding: 1rem;
  backdrop-filter: blur(6px);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 1.5rem;
  width: min(700px, 100%);
  max-height: 88vh; overflow-y: auto;
  animation: slideUp 0.18s ease;
  position: relative;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

.modal-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 1.25rem; gap: 10px;
}
.modal-section-id { font-family: var(--mono); font-size: 10px; color: var(--hint); margin-bottom: 3px; }
.modal-section-name { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--gold); }
.modal-section-desc { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.55; }

.folder-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
.folder-table th {
  font-size: 9.5px; font-family: var(--mono); color: var(--hint);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left;
}
.folder-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: top; }
.folder-table tr:last-child td { border-bottom: none; }
.folder-table tr:hover td { background: var(--surface2); }

.ft-num  { font-family: var(--mono); font-size: 11px; color: var(--hint); white-space: nowrap; }
.ft-name { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 500; }
.ft-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* ── TREE VIEW TAB ── */
.tree { font-family: var(--mono); font-size: 12px; line-height: 1.9; }
.tree-root {
  color: var(--text); font-size: 13px; font-weight: 600;
  margin-bottom: 6px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.tree-section { margin-bottom: 2px; }
.tree-section-label {
  display: flex; align-items: center; gap: 8px;
  color: var(--gold); cursor: pointer; padding: 3px 0;
  transition: color 0.15s;
}
.tree-section-label:hover { color: #fff; }
.tree-section-label .chevron {
  font-size: 9px; color: var(--hint);
  transition: transform 0.2s;
  display: inline-block;
}
.tree-section-label .chevron.open { transform: rotate(90deg); }
.tree-section-num { color: var(--hint); font-size: 10px; }
.tree-children { padding-left: 20px; overflow: hidden; }
.tree-child {
  color: var(--muted); display: flex; align-items: baseline; gap: 8px;
  padding: 1px 0;
}
.tree-child-num { color: var(--hint); font-size: 10px; min-width: 44px; }
.tree-child:hover { color: var(--text); }

/* ── EMPTY ── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--hint); }
.empty-icon { font-size: 2.5rem; opacity: 0.2; margin-bottom: 0.75rem; }
.empty p { font-size: 13px; }

/* ── LOADING ── */
#loadingOverlay {
  position: fixed; inset: 0; z-index: 300;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px;
  transition: opacity 0.35s;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  box-shadow: 0 0 30px rgba(77,124,254,0.5);
  animation: breathe 2s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{box-shadow:0 0 20px rgba(77,124,254,0.4)} 50%{box-shadow:0 0 40px rgba(77,124,254,0.8)} }
.loading-text { font-family: var(--mono); font-size: 11px; color: var(--hint); letter-spacing: 0.1em; }
.loading-bar { width: 180px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-bar-inner { height: 100%; background: var(--accent); border-radius: 2px; animation: loadBar 1.2s ease-in-out infinite; width: 40%; }
@keyframes loadBar { 0%{margin-left:-40%} 100%{margin-left:100%} }

@media (max-width: 600px) {
  .container { padding: 1rem; }
  header { padding: 0 1rem; }
  .sections-grid { grid-template-columns: 1fr; }
  .logo span { display: none; }
}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">Σ</div>
  <div class="loading-text">LOADING IR SHARED DRIVE MAP…</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark">Σ</div>
    <span>LA SIERRA UNIVERSITY / INSTITUTIONAL RESEARCH</span>
  </div>
  <div class="header-right">
    <a href="index.html" class="btn btn-sm">← Schema Reference</a>
  </div>
</header>

<div class="container">
  <div class="page-eyebrow">IR Shared Drive — Directory Structure</div>
  <div class="page-heading">IR File System <strong>Reference</strong></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('cards', this)">SECTIONS</div>
    <div class="tab" onclick="switchTab('tree', this)">TREE VIEW</div>
  </div>

  <!-- CARDS VIEW -->
  <div id="view-cards">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search folders, descriptions…" oninput="render()">
      </div>
      <select id="catFilter" onchange="render()">
        <option value="">All sections</option>
        <option value="external">100 External Request</option>
        <option value="internal">200 Internal Request</option>
        <option value="ir">300 Institutional Research</option>
        <option value="database">400 Database</option>
      </select>
    </div>

    <div class="stats-bar" id="statsBar"></div>
    <div class="sections-grid" id="grid"></div>
  </div>

  <!-- TREE VIEW -->
  <div id="view-tree" style="display:none">
    <div class="tree" id="treeContainer"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeBg(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const SECTIONS = [
  {
    id: '100',
    cat: 'external',
    name: '100 External Request',
    desc: 'Reporting submissions to external agencies, organized by reporter and academic year.',
    folders: [
      { num: '100.1',  name: 'IPEDS',                      desc: 'Annual IPEDS submissions (2001–02 through 2025–26)' },
      { num: '100.2',  name: 'AICCU',                      desc: 'Includes ASRS and ADT sub-reports' },
      { num: '100.3',  name: 'CollegeBoard',                desc: 'CollegeBoard Profile submissions' },
      { num: '100.4',  name: 'Peterson',                   desc: 'Graduate/undergrad/financial aid surveys' },
      { num: '100.5',  name: 'U.S. News',                  desc: 'Rankings data submissions' },
      { num: '100.6',  name: 'NAD',                        desc: 'North American Division reporting' },
      { num: '100.7',  name: 'NSSE',                       desc: 'Student engagement survey data' },
      { num: '100.8',  name: 'WASC',                       desc: 'Accreditation-related data' },
      { num: '100.9',  name: 'Wall Street Journal',         desc: '' },
      { num: '100.10', name: 'National Student Clearinghouse', desc: '' },
      { num: '100.11', name: 'City of Riverside',           desc: '' },
      { num: '100.12', name: 'CSG GRE',                    desc: '' },
      { num: '100.13', name: 'Wintergreen Orchard House',   desc: '' },
      { num: '100.14', name: 'PDP',                        desc: '' },
      { num: '100.15', name: 'Academic Request',            desc: '' },
      { num: '100.16', name: 'Hanover',                    desc: '' },
    ]
  },
  {
    id: '200',
    cat: 'internal',
    name: '200 Internal Request',
    desc: 'Data and reports produced for internal university stakeholders.',
    folders: [
      { num: '200.1', name: 'University',   desc: 'Enrollment, Retention, Graduation, Admission, GPA, Units, FactBook, LSU Web, Provost, IEAT' },
      { num: '200.2', name: 'Department',   desc: 'Reports by department: President, Provost, Admission, Advancement, Enrollment, Finance, Financial Aid, HR, Library, SASS/OCAS, Student Life, Title V, Athletics, and others' },
      { num: '200.3', name: 'Colleges',     desc: 'Arts & Sciences, Divinity, Education, Business, Sustainability' },
      { num: '200.4', name: 'Faculty',      desc: '' },
      { num: '200.5', name: 'Dashboard',    desc: 'Admission/Enrollment, Colleges, Graduation, Retention, SASS, Title V, Summary' },
    ]
  },
  {
    id: '300',
    cat: 'ir',
    name: '300 Institutional Research',
    desc: 'IR office operations, internal research work, and administrative records.',
    folders: [
      { num: '300.1',  name: 'AIR Conference',              desc: '' },
      { num: '300.2',  name: 'CAIR Conference',             desc: 'Conference materials' },
      { num: '300.3',  name: 'Banner Reports and Dictionary', desc: 'System reports and data dictionaries' },
      { num: '300.4',  name: 'WASCUCS',                    desc: '' },
      { num: '300.5',  name: 'Accounts',                   desc: '' },
      { num: '300.6',  name: 'General Research',            desc: '' },
      { num: '300.7',  name: 'Assessment',                  desc: 'Annual assessment files (2017–18 through 2025–26)' },
      { num: '300.8',  name: 'Project Ledger',              desc: '' },
      { num: '300.9',  name: 'Data Governance',             desc: '' },
      { num: '300.10', name: 'Dictionary',                  desc: '' },
      { num: '300.11', name: 'Employee Birthday',           desc: '' },
      { num: '300.12', name: 'Data Warehouse',              desc: 'Query validation and job schedules' },
      { num: '300.13', name: 'IR Research',                 desc: 'Projects by area (Business, English, HR, Math, Pre-Professional)' },
      { num: '300.14', name: 'Institutional Research How To', desc: '' },
      { num: '300.15', name: 'Other Conferences',           desc: '' },
      { num: '300.16', name: 'Finance Admin',               desc: '' },
      { num: '300.17', name: 'Internship',                  desc: '' },
      { num: '300.18', name: 'Minutes with Provost',        desc: '' },
      { num: '300.99', name: 'Others',                     desc: '' },
    ]
  },
  {
    id: '400',
    cat: 'database',
    name: '400 Database',
    desc: 'Core data tables and documentation, mostly sourced from the Banner Student Information System (SIS).',
    folders: [
      { num: '400.1', name: 'Census',        desc: 'IPEDS census, IR census, graduation cohort snapshots' },
      { num: '400.2', name: 'Live',           desc: 'Live Banner data tables (SWWDOME, SWWREST, SWWGEDI, etc.), Slate data, enrollment/GPA/graduation files' },
      { num: '400.3', name: 'Documents',      desc: '' },
      { num: '400.4', name: 'Documentation',  desc: 'MS SQL and other documentation' },
      { num: '400.5', name: 'Other Data',     desc: 'Miscellaneous data (Clearinghouse, IPEDS, Marketing, Title V, LLU, etc.)' },
      { num: '400.6', name: 'DEGREEWORK',     desc: '' },
      { num: '400.7', name: 'RAG',            desc: 'Bulletin, FactBook, IPEDS, Pre-Project Research' },
      { num: '400.8', name: 'HR - Faculty',   desc: '' },
    ]
  }
];

const CAT_COLORS = {
  external: { badge: 'badge-external', label: 'External' },
  internal: { badge: 'badge-internal', label: 'Internal' },
  ir:       { badge: 'badge-ir',       label: 'IR Office' },
  database: { badge: 'badge-database', label: 'Database' },
};

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-cards').style.display = name === 'cards' ? '' : 'none';
  document.getElementById('view-tree').style.display  = name === 'tree'  ? '' : 'none';
  if (name === 'tree') renderTree();
}

// ══════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════
function catBadge(cat) {
  const c = CAT_COLORS[cat] || { badge: 'badge-external', label: cat };
  return `<span class="badge ${c.badge}">${c.label}</span>`;
}

function render() {
  const q  = (document.getElementById('search').value || '').toLowerCase();
  const cf = document.getElementById('catFilter').value;

  const shown = SECTIONS.filter(s => {
    if (cf && s.cat !== cf) return false;
    if (!q) return true;
    if (s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)) return true;
    return s.folders.some(f =>
      f.name.toLowerCase().includes(q) || (f.desc && f.desc.toLowerCase().includes(q))
    );
  });

  // stats bar
  const counts = {};
  SECTIONS.forEach(s => counts[s.cat] = (counts[s.cat] || 0) + 1);
  document.getElementById('statsBar').innerHTML =
    `<div class="stat"><strong>${shown.length}</strong> of ${SECTIONS.length} sections</div>` +
    Object.entries(counts).map(([c, n]) =>
      `<div class="stat">${catBadge(c)} <strong>${n}</strong></div>`
    ).join('');

  const g = document.getElementById('grid');
  if (!shown.length) {
    g.innerHTML = `<div class="empty"><div class="empty-icon">⌀</div><p>No sections match your search.</p></div>`;
    return;
  }

  g.innerHTML = shown.map(s => {
    const preview = s.folders.slice(0, 5).map(f =>
      `<div class="folder-item">
        <span class="folder-num">${f.num}</span>
        <span class="folder-name">${f.name}</span>
        ${f.desc ? `<span class="folder-sub">— ${f.desc.length > 50 ? f.desc.slice(0,50) + '…' : f.desc}</span>` : ''}
       </div>`
    ).join('');
    const more = s.folders.length > 5
      ? `<div class="folder-more">+${s.folders.length - 5} more folders…</div>`
      : '';

    return `<div class="section-card" onclick="openSection('${s.id}')">
      <div class="section-card-header">
        <div>
          <div class="section-id">${s.id} SERIES</div>
          <div class="section-name">${s.name}</div>
        </div>
        <div class="badges">${catBadge(s.cat)}</div>
      </div>
      <div class="section-desc">${s.desc}</div>
      <div class="folder-list">${preview}${more}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// MODAL DETAIL
// ══════════════════════════════════════════════
function openSection(id) {
  const s = SECTIONS.find(x => x.id === id);
  if (!s) return;

  const rows = s.folders.map(f => `<tr>
    <td class="ft-num">${f.num}${f.note ? ' <span class="badge badge-note">⚠ num</span>' : ''}</td>
    <td class="ft-name">${f.name}</td>
    <td class="ft-desc">${f.desc || '<span style="color:var(--hint)">—</span>'}</td>
  </tr>`).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <div style="flex:1;min-width:0">
        <div class="modal-section-id">${s.id} SERIES · ${CAT_COLORS[s.cat]?.label || s.cat}</div>
        <div class="modal-section-name">${s.name}</div>
        <div class="modal-section-desc">${s.desc}</div>
        ${s.note ? `<div style="margin-top:8px;font-size:11px;color:var(--amber);font-family:var(--mono)">⚠ ${s.note}</div>` : ''}
      </div>
      <button class="btn" onclick="closeModal()">✕</button>
    </div>
    <table class="folder-table">
      <thead>
        <tr>
          <th style="width:80px">Number</th>
          <th>Folder</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:1rem;padding-top:0.75rem;border-top:1px solid var(--border);font-size:11px;color:var(--hint);font-family:var(--mono)">
      ${s.folders.length} folders in this section
    </div>`;

  document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function closeBg(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

// ══════════════════════════════════════════════
// TREE VIEW
// ══════════════════════════════════════════════
function renderTree() {
  const tree = document.getElementById('treeContainer');
  tree.innerHTML = `<div class="tree-root">📁 IR Shared Drive</div>` +
    SECTIONS.map(s => {
      const childrenId = 'tc_' + s.id;
      const children = s.folders.map(f =>
        `<div class="tree-child">
          <span class="tree-child-num">${f.num}</span>
          <span>${f.name}${f.desc ? ` <span style="color:var(--hint)">— ${f.desc.length > 60 ? f.desc.slice(0,60)+'…' : f.desc}</span>` : ''}</span>
         </div>`
      ).join('');
      return `<div class="tree-section">
        <div class="tree-section-label" onclick="toggleTree('${childrenId}', this)">
          <span class="chevron" id="ch_${childrenId}">▶</span>
          <span class="tree-section-num">${s.id}</span>
          <span style="color:var(--gold)">${s.name}</span>
          <span style="color:var(--hint);font-size:10px">${s.folders.length} folders</span>
        </div>
        <div class="tree-children" id="${childrenId}" style="display:none">${children}</div>
      </div>`;
    }).join('');
}

function toggleTree(id, el) {
  const container = document.getElementById(id);
  const chevron   = el.querySelector('.chevron');
  const open = container.style.display !== 'none';
  container.style.display = open ? 'none' : '';
  chevron.classList.toggle('open', !open);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.addEventListener('load', () => {
  render();
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, 600);
});
</script>
</body>
</html>
